# nginx.conf COMPLETO do container tudo-em-um (substitui o /etc/nginx/nginx.conf
# do Debian para evitar conflito de "default server" e mandar erros pro stderr,
# que aparecem nos logs do Easypanel). Serve o SPA e faz proxy de /api e /mcp
# para os processos node no MESMO container (127.0.0.1). Uma porta só: 80.

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
      proxy_pass http://127.0.0.1:8787;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Superfície PÚBLICA da API — páginas hospedadas de form (/f/:id) e proposta
    # (/p/:id), endpoints anônimos (/public/...) e o script de embed. Sem isto
    # tudo cai no try_files do SPA e "abre o app" em vez da página.
    location ~ ^/(f|p|public)(/|$) {
      proxy_pass http://127.0.0.1:8787;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /embed.js {
      proxy_pass http://127.0.0.1:8787;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /mcp {
      proxy_pass http://127.0.0.1:8788;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      chunked_transfer_encoding on;
    }

    # Assets são content-hashed (o nome muda a cada build) → podem ser cacheados
    # pra sempre com segurança.
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA — qualquer rota cai no index.html. O index.html NUNCA pode ficar em
    # cache: sem isto o navegador reusa um shell antigo (cache heurístico) que
    # aponta pra chunks já removidos e quebra depois do deploy ("Failed to fetch
    # dynamically imported module"). no-store força revalidar o shell sempre.
    location / {
      add_header Cache-Control "no-store" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
