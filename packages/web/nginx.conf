# nginx do front: serve o SPA e faz proxy de /api -> api e /mcp -> mcp.
# Tudo numa porta só (80). Coloque um proxy com TLS (Caddy/Traefik/nginx) na frente p/ HTTPS.

server {
  listen 80;
  server_name _;

  # Resolver embutido do Docker — permite reidratar o IP dos serviços se reiniciarem.
  resolver 127.0.0.11 valid=30s;

  root /usr/share/nginx/html;
  index index.html;

  # Upload de vídeo (criativo/anúncio), áudio do WhatsApp e mídia social passam
  # por aqui. O default do nginx é 1 MB e devolve um 413 em HTML cru na cara do
  # usuário — a API aceita 500 MB (limits.fileSize do @fastify/multipart), então
  # o proxy tem que acompanhar. Timeouts largos porque subir vídeo é lento.
  client_max_body_size 512m;
  client_body_timeout 600s;

  # API REST -> serviço "api"
  location /api/ {
    set $api_upstream http://api:8787;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  # MCP (Streamable HTTP / SSE) -> serviço "mcp". Buffering off é essencial p/ o stream.
  location /mcp {
    set $mcp_upstream http://mcp:8788;
    proxy_pass $mcp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
  }

  # Assets são content-hashed (o nome muda a cada build) → cache eterno seguro.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA — qualquer rota cai no index.html. O index.html NUNCA em cache: sem isto
  # o navegador reusa um shell antigo (cache heurístico) que aponta pra chunks já
  # removidos e quebra depois do deploy ("Failed to fetch dynamically imported
  # module"). no-store força revalidar o shell a cada carregamento.
  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri $uri/ /index.html;
  }
}
